<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOTEL ROYAL INN | Management</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --primary: #1a2a6c; --secondary: #2c3e50; --accent: #fdbb2d;
            --success: #00a86b; --danger: #e74c3c; --report-blue: #1e4f8a;
            --nav-bg: #1e4f8a; --bg: #f4f7f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #login-page { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(to right, #1a2a6c, #b21f1f); position: fixed; width: 100%; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 350px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .top-nav { background: var(--nav-bg); display: flex; justify-content: center; padding: 10px 0; gap: 5px; flex-wrap: wrap; }
        .nav-btn { background: rgba(255,255,255,0.1); color: white; border: none; padding: 10px 15px; cursor: pointer; font-size: 13px; font-weight: 500; border-radius: 4px; }
        .nav-btn.active { background: white; color: var(--nav-bg); }
        .main-container { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 60px; }
        .inventory { display: none; }
        .inventory.active { display: block; }
        .card { background: white; padding: 25px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin: 0 auto; max-width: 1000px; margin-bottom: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { font-size: 12px; font-weight: 600; color: #444; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; }
        .btn-green { width: 100%; background: var(--success); color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .report-table th { background: var(--report-blue); color: white; padding: 10px; border: 1px solid #ddd; }
        .report-table td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        .btn-edit { background: #2980b9; color: white; border: none; padding: 5px 8px; cursor: pointer; border-radius: 3px; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 5px 8px; cursor: pointer; border-radius: 3px; }
        .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        .room { padding: 15px 0; text-align: center; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; }
        .available { background: var(--success); }
        .booked { background: var(--danger); }
        footer { position: fixed; bottom: 0; width: 100%; background: #f4f7f6; padding: 10px; text-align: center; font-size: 12px; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-box">
            <h1>HOTEL ROYAL INN</h1>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-green" onclick="login()">LOGIN</button>
        </div>
    </div>

    <div class="top-nav">
        <button class="nav-btn active" onclick="nav('room-inv', this)">Room Inventory</button>
        <button class="nav-btn" onclick="nav('guest-inv', this)">Guest Registration</button>
        <button class="nav-btn" onclick="nav('report-inv', this)">Sale Reports</button>
        <button class="nav-btn" onclick="nav('accounts-inv', this)">Income & Expenses</button>
        <button class="nav-btn" onclick="nav('payment-inv', this)">Payment Slip</button>
    </div>

    <div class="main-container">
        <!-- ROOMS -->
        <div id="room-inv" class="inventory active"><div id="room-container"></div></div>

        <!-- ACCOUNTS (Updated with Category Box) -->
        <div id="accounts-inv" class="inventory">
            <div class="card">
                <h3>Income Source Entry</h3><br>
                <div class="grid-3">
                    <div>
                        <label>Received Via</label>
                        <select id="inc-via">
                            <option>Cash</option>
                            <option>Matin Gpay</option>
                            <option>Pritam Gpay</option>
                            <option>Cheque</option>
                            <option>Card</option>
                            <option>Jatan Sir</option>
                        </select>
                    </div>
                    <div><label>Income Category</label><input type="text" id="inc-cat" placeholder="e.g. Room Rent, Food"></div>
                    <div><label>Amount</label><input type="number" id="inc-amt"></div>
                </div>
                <input type="hidden" id="inc-edit-idx" value="-1">
                <button class="btn-green" id="inc-btn" onclick="saveIncome()">SUBMIT INCOME ENTRY</button>
                <table class="report-table">
                    <thead><tr><th>Received Via</th><th>Category</th><th>Amount</th><th>Action</th></tr></thead>
                    <tbody id="income-body"></tbody>
                </table>
            </div>

            <div class="card">
                <h3>Expenses Source Entry</h3><br>
                <div class="grid-2">
                    <div><label>Expense Category</label><input type="text" id="exp-cat" placeholder="e.g. Laundry, Salary"></div>
                    <div><label>Amount</label><input type="number" id="exp-amt"></div>
                </div>
                <input type="hidden" id="exp-edit-idx" value="-1">
                <button class="btn-green" id="exp-btn" onclick="saveExpense()" style="background:var(--danger)">SUBMIT EXPENSE ENTRY</button>
                <table class="report-table">
                    <thead><tr><th>Category</th><th>Amount</th><th>Action</th></tr></thead>
                    <tbody id="expense-body"></tbody>
                </table>
            </div>
        </div>

        <!-- OTHER SECTIONS REMAIN SAME -->
        <div id="guest-inv" class="inventory"><div class="card"><h3>Guest Registration</h3><p>Registration Form here...</p></div></div>
        <div id="report-inv" class="inventory"><div class="card"><h3>Sale Reports</h3><p>Daily Sales here...</p></div></div>
        <div id="payment-inv" class="inventory"><div class="card"><h3>Payment Slip</h3><p>Slip Generator...</p></div></div>

        <footer>website desain & develop by MATINDRA TRIPURA</footer>
    </div>

    <script>
        // --- SAFE DATA LOADING (Prevents Data Loss) ---
        let rooms = JSON.parse(localStorage.getItem('royal_rooms')) || {};
        let income = JSON.parse(localStorage.getItem('royal_income')) || [];
        let expenses = JSON.parse(localStorage.getItem('royal_expenses')) || [];

        function login() {
            if(document.getElementById('user').value === "ROYAL INN" && document.getElementById('pass').value === "543215") {
                document.getElementById('login-page').style.display = 'none';
                renderAccounts();
            } else { alert("Wrong Login"); }
        }

        function nav(id, btn) {
            document.querySelectorAll('.inventory').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // --- INCOME LOGIC ---
        function saveIncome() {
            const via = document.getElementById('inc-via').value;
            const cat = document.getElementById('inc-cat').value;
            const amt = document.getElementById('inc-amt').value;
            const idx = parseInt(document.getElementById('inc-edit-idx').value);

            if(!cat || !amt) return alert("Fill all fields");

            if(idx > -1) {
                income[idx] = { via, cat, amt };
                document.getElementById('inc-edit-idx').value = "-1";
                document.getElementById('inc-btn').innerText = "SUBMIT INCOME ENTRY";
            } else {
                income.push({ via, cat, amt });
            }
            
            localStorage.setItem('royal_income', JSON.stringify(income));
            clearInc();
            renderAccounts();
        }

        function renderAccounts() {
            const iBody = document.getElementById('income-body');
            const eBody = document.getElementById('expense-body');
            iBody.innerHTML = ""; eBody.innerHTML = "";

            income.forEach((item, idx) => {
                iBody.innerHTML += `<tr><td>${item.via}</td><td>${item.cat}</td><td>${item.amt}</td>
                <td><button class="btn-edit" onclick="editInc(${idx})">Edit</button> 
                <button class="btn-del" onclick="delInc(${idx})">Del</button></td></tr>`;
            });

            expenses.forEach((item, idx) => {
                eBody.innerHTML += `<tr><td>${item.cat}</td><td>${item.amt}</td>
                <td><button class="btn-edit" onclick="editExp(${idx})">Edit</button> 
                <button class="btn-del" onclick="delExp(${idx})">Del</button></td></tr>`;
            });
        }

        function editInc(idx) {
            document.getElementById('inc-via').value = income[idx].via;
            document.getElementById('inc-cat').value = income[idx].cat;
            document.getElementById('inc-amt').value = income[idx].amt;
            document.getElementById('inc-edit-idx').value = idx;
            document.getElementById('inc-btn').innerText = "UPDATE INCOME";
        }

        function delInc(idx) { if(confirm("Delete?")) { income.splice(idx,1); localStorage.setItem('royal_income', JSON.stringify(income)); renderAccounts(); } }

        // --- EXPENSE LOGIC ---
        function saveExpense() {
            const cat = document.getElementById('exp-cat').value;
            const amt = document.getElementById('exp-amt').value;
            const idx = parseInt(document.getElementById('exp-edit-idx').value);
            if(!cat || !amt) return alert("Fill fields");

            if(idx > -1) { expenses[idx] = { cat, amt }; document.getElementById('exp-edit-idx').value = "-1"; }
            else { expenses.push({ cat, amt }); }

            localStorage.setItem('royal_expenses', JSON.stringify(expenses));
            document.getElementById('exp-cat').value = ""; document.getElementById('exp-amt').value = "";
            renderAccounts();
        }

        function editExp(idx) {
            document.getElementById('exp-cat').value = expenses[idx].cat;
            document.getElementById('exp-amt').value = expenses[idx].amt;
            document.getElementById('exp-edit-idx').value = idx;
        }

        function delExp(idx) { if(confirm("Delete?")) { expenses.splice(idx,1); localStorage.setItem('royal_expenses', JSON.stringify(expenses)); renderAccounts(); } }

        function clearInc() { document.getElementById('inc-cat').value = ""; document.getElementById('inc-amt').value = ""; }
    </script>
</body>
</html>
