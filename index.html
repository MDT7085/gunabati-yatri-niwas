<div class="glass-card" style="margin-top: 25px; border-left: 5px solid #10b981; background: #f0fdf4;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <label style="color: #166534; font-weight: 800;">✨ Auto-Generated Welcome SMS</label>
        <button onclick="copySMS()" style="background: #166534; color: white; border: none; padding: 5px 12px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; font-weight: 700;">
            COPY MESSAGE
        </button>
    </div>
    <div id="sms-display" style="font-family: 'Courier New', monospace; font-size: 0.9rem; color: #14532d; line-height: 1.5; background: white; padding: 15px; border-radius: 10px; border: 1px solid #bbf7d0;">
        Waiting for Guest Name and Check-In Date...
    </div>
</div>

<script>
    // This function runs every time you type in the Name or Date fields
    function liveUpdate() {
        const name = document.getElementById('gName').value || "Guest";
        const cinRaw = document.getElementById('gIn').value;
        const type = document.getElementById('gType').value;
        
        // Stats Calculation
        const ad = document.getElementById('gAdult').value || 0;
        const ch = document.getElementById('gChild').value || 0;
        const tot = document.getElementById('gTotal').value || 0;
        const adv = document.getElementById('gAdv').value || 0;
        
        document.getElementById('stat-adult').innerText = ad;
        document.getElementById('stat-child').innerText = ch;
        document.getElementById('stat-due').innerText = "₹" + (tot - adv);

        // SMS Generation Logic
        if(cinRaw) {
            const d = cinRaw.split('-');
            const formattedDate = `${d[2]}/${d[1]}/${d[0]}`;
            
            const message = `Hello ${name}! 🏨 

Welcome to Hotel Royal Inn. We are pleased to confirm your reservation for a ${type} on ${formattedDate}. 

Total PAX: ${ad} Adult(s) & ${ch} Child(ren). 
Location: [Insert Google Maps Link]

We look forward to hosting you! 
- Regards, Matindra Tripura`;

            document.getElementById('sms-display').innerText = message;
        } else {
            document.getElementById('sms-display').innerText = "Please select a Check-In Date to generate the message.";
        }
    }

    // Function to copy the SMS to your phone/computer clipboard
    function copySMS() {
        const text = document.getElementById('sms-display').innerText;
        if(text.includes("Waiting") || text.includes("Please select")) {
            alert("Please complete the guest details first!");
            return;
        }
        navigator.clipboard.writeText(text).then(() => {
            alert("✅ Welcome SMS copied! You can now paste it into WhatsApp.");
        });
    }
</script>
