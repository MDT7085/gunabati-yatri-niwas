<script>

// 🔥 LOAD SAVED DATA
let bookedRooms = JSON.parse(localStorage.getItem("rooms")) || {};
let salesData = JSON.parse(localStorage.getItem("sales")) || [];
let staffData = JSON.parse(localStorage.getItem("staff")) || [];
let guestLogs = JSON.parse(localStorage.getItem("guestLogs")) || [];
let accountData = JSON.parse(localStorage.getItem("accounts")) || [];
let attendance = JSON.parse(localStorage.getItem("attendance")) || Array(31).fill('work');

let currentRoom = null;
let previewImgData = "";

// 🔥 SAVE FUNCTION
function saveAll(){
    localStorage.setItem("rooms", JSON.stringify(bookedRooms));
    localStorage.setItem("sales", JSON.stringify(salesData));
    localStorage.setItem("staff", JSON.stringify(staffData));
    localStorage.setItem("guestLogs", JSON.stringify(guestLogs));
    localStorage.setItem("accounts", JSON.stringify(accountData));
    localStorage.setItem("attendance", JSON.stringify(attendance));
}

// 🔐 LOGIN (UPDATED LOAD)
function handleLogin() {
    if(document.getElementById('username').value === "ROYAL INN" &&
       document.getElementById('password').value === "MANAGER ROYAL") {

        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');

        renderRooms();
        renderCalendar('sal-cal');
        renderSales();
        renderStaff();
        renderDataLogs();
        renderAccounts();

    } else alert("Invalid Login");
}

// 🏨 ROOM SAVE
function checkoutRoom() {
    delete bookedRooms[currentRoom];
    saveAll();
    closeModal();
    renderRooms();
}

function saveGuest() {
    let r = document.getElementById('reg-room').value;
    let n = document.getElementById('reg-name').value;

    if(!r || !n) return alert("Room & Name Required");

    bookedRooms[r] = {
        name: n,
        in: document.getElementById('reg-in').value,
        out: document.getElementById('reg-out').value
    };

    guestLogs.push({
        name: n,
        father: document.getElementById('reg-father').value,
        in: document.getElementById('reg-in').value,
        out: document.getElementById('reg-out').value,
        from: document.getElementById('reg-from').value,
        to: document.getElementById('reg-to').value,
        stay: document.getElementById('reg-stay').value
    });

    saveAll();
    renderRooms();
    renderDataLogs();
    showSection('room-status');
}

// 💰 SALES SAVE
function addSale() {
    let d = document.getElementById('sale-date').value;
    let r = parseFloat(document.getElementById('sale-room-amt').value) || 0;
    let f = parseFloat(document.getElementById('sale-food-amt').value) || 0;

    if(d) {
        salesData.push({ d, r, f });
        saveAll();
        renderSales();
    }
}

// 👨‍💼 STAFF SAVE
function addStaff() {
    staffData.push({
        name: document.getElementById('st-name').value,
        desig: document.getElementById('st-desig').value,
        sal: document.getElementById('st-salary').value,
        id: document.getElementById('st-id').value,
        img: previewImgData
    });
    saveAll();
    renderStaff();
}

// 📋 DATA LOG SAVE
function saveDataLog() {
    guestLogs.push({
        name: document.getElementById('ds-name').value,
        father: document.getElementById('ds-father').value,
        in: document.getElementById('ds-in').value,
        out: document.getElementById('ds-out').value,
        from: document.getElementById('ds-from').value,
        to: document.getElementById('ds-to').value,
        stay: document.getElementById('ds-stay').value
    });
    saveAll();
    renderDataLogs();
}

// 💳 ACCOUNTS SAVE
function addAccount(type) {
    let source = type === 'income' ? document.getElementById('inc-source').value : document.getElementById('exp-source').value;
    let amt = type === 'income' ? document.getElementById('inc-amt').value : document.getElementById('exp-amt').value;
    let mode = type === 'income' ? document.getElementById('inc-mode').value : "Cash";

    if(source && amt) {
        accountData.push({ type, source, mode, amt });
        saveAll();
        renderAccounts();
    }
}

// 📅 ATTENDANCE SAVE
function toggleDay(i, id) {
    let st = ['work', 'holiday', 'absent'];
    attendance[i] = st[(st.indexOf(attendance[i]) + 1) % 3];
    saveAll();
    renderCalendar(id);
}

// ❌ DELETE FIX (EXAMPLE — APPLY EVERYWHERE)
function deleteSale(i){
    salesData.splice(i,1);
    saveAll();
    renderSales();
}

function deleteStaff(i){
    staffData.splice(i,1);
    saveAll();
    renderStaff();
}

function deleteLog(i){
    guestLogs.splice(i,1);
    saveAll();
    renderDataLogs();
}

function deleteAccount(i){
    accountData.splice(i,1);
    saveAll();
    renderAccounts();
}

</script>
