<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Inn | Executive Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar: #0f172a;
            --accent: #fbbf24;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.98);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; overflow: hidden; color: #1e293b; }

        /* --- SIDEBAR --- */
        aside {
            width: 280px; background: var(--sidebar); color: white; padding: 40px 20px;
            display: flex; flex-direction: column; justify-content: space-between;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .logo-box h2 { font-size: 1.3rem; color: var(--accent); letter-spacing: 1px; font-weight: 800; }
        .nav-link {
            padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s;
            margin-top: 15px; display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 0.9rem;
        }
        .nav-link.active { background: var(--accent); color: var(--sidebar); }
        .nav-link:hover:not(.active) { background: rgba(255,255,255,0.05); }

        /* --- MAIN CONTENT --- */
        main { flex: 1; overflow-y: auto; padding: 40px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        .glass-card {
            background: var(--glass); border-radius: 24px; padding: 35px;
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.05); border: 1px solid white;
        }

        /* --- FORM STYLING --- */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.7rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select {
            padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 0.95rem;
            background: #fff; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.1); }

        /* --- WELCOME SMS BOX (NEW) --- */
        .sms-container {
            margin-top: 30px; background: #fffbeb; border: 1px solid #fef3c7;
            border-radius: 16px; padding: 25px; position: relative;
        }
        .sms-tag {
            position: absolute; top: -12px; left: 20px; background: #fbbf24;
            color: #78350f; font-size: 0.65rem; font-weight: 900; padding: 4px 10px; border-radius: 6px;
        }
        #sms-body {
            font-size: 0.95rem; color: #92400e; font-weight: 500; line-height: 1.6;
            white-space: pre-wrap; margin-bottom: 15px;
        }
        .btn-copy {
            background: #92400e; color: white; border: none; padding: 8px 15px;
            border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 700; transition: 0.2s;
        }
        .btn-copy:hover { opacity: 0.9; }

        /* --- BUTTONS --- */
        .btn-save {
            background: var(--sidebar); color: white; padding: 18px; border: none;
            border-radius: 14px; cursor: pointer; font-weight: 700; width: 100%;
            font-size: 1rem; margin-top: 25px; transition: 0.3s;
        }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(15,23,42,0.2); }

        /* --- TABLE --- */
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { text-align: left; padding: 0 20px; color: #94a3b8; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .row-data { background: white; transition: 0.2s; }
        .row-data td { padding: 20px; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        .row-data td:first-child { border-left: 1px solid #f1f5f9; border-radius: 15px 0 0 15px; font-weight: 700; }
        .row-data td:last-child { border-right: 1px solid #f1f5f9; border-radius: 0 15px 15px 0; }

        /* --- SLIP MODAL --- */
        #modal { display:none; position:fixed; inset:0; background:rgba(15, 23, 42, 0.9); z-index: 9999; justify-content:center; align-items:center; }
        .slip { background: white; width: 450px; padding: 40px; border-radius: 4px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        .footer-sign { text-align: center; margin-top: auto; padding-top: 20px; font-size: 0.7rem; opacity: 0.5; font-weight: 700; letter-spacing: 1px; }

        @media print {
            aside, main { display: none !important; }
            #modal { display: flex !important; position: static; background: white; }
            .slip { box-shadow: none; border: 1px solid #eee; width: 100%; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

<aside>
    <div>
        <div class="logo-box"><h2>ROYAL INN</h2></div>
        <div class="nav-link active" id="l-new" onclick="show('new')">Reception desk</div>
        <div class="nav-link" id="l-db" onclick="show('db')">Guest records</div>
    </div>
    <div class="footer-sign">BY MATINDRABTRIPURA</div>
</aside>

<main>
    <div class="header-bar">
        <h1 id="title">Reservation Desk</h1>
        <div id="clock" style="font-weight: 700; color: var(--sidebar); background: var(--accent); padding: 8px 15px; border-radius: 10px;"></div>
    </div>

    <div id="tab-new">
        <div class="glass-card">
            <div class="form-grid">
                <div class="input-group"><label>Guest Name</label><input type="text" id="gName" placeholder="Ex: John Doe" onkeyup="updateSMS()"></div>
                <div class="input-group"><label>Contact</label><input type="tel" id="gPhone" placeholder="+91"></div>
                <div class="input-group">
                    <label>PAX (Adult | Child)</label>
                    <div style="display:flex; gap:10px;">
                        <input type="number" id="gAdult" value="2" min="1" style="flex:1">
                        <input type="number" id="gChild" value="0" min="0" style="flex:1">
                    </div>
                </div>
                <div class="input-group"><label>Check-In Date</label><input type="date" id="gIn" onchange="updateSMS()"></div>
                <div class="input-group"><label>Check-Out Date</label><input type="date" id="gOut"></div>
                <div class="input-group">
                    <label>Room Category</label>
                    <select id="gType"><option>Super Deluxe AC</option><option>Suite</option><option>Standard</option></select>
                </div>
                <div class="input-group"><label>Total Bill (₹)</label><input type="number" id="gTotal"></div>
                <div class="input-group"><label>Advance Pay (₹)</label><input type="number" id="gAdv"></div>
                <div class="input-group"><label>Room Qty</label><input type="number" id="gQty" value="1"></div>
            </div>

            <div class="sms-container">
                <div class="sms-tag">WELCOME SMS GENERATOR</div>
                <div id="sms-body">Please enter guest name and check-in date...</div>
                <button class="btn-copy" onclick="copySMS()">COPY MESSAGE</button>
            </div>

            <button class="btn-save" onclick="save()">Confirm Booking & Print</button>
        </div>
    </div>

    <div id="tab-db" style="display:none;">
        <div class="glass-card">
            <table>
                <thead>
                    <tr><th>Guest Name</th><th>Pax</th><th>Dates (DD/MM/YY)</th><th>Room</th><th>Balance</th><th>Action</th></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</main>

<div id="modal">
    <div class="slip">
        <center>
            <h1 style="color:var(--sidebar); letter-spacing:2px; margin-bottom:0;">ROYAL INN</h1>
            <p style="font-size:0.7rem; font-weight:800; color:var(--accent); margin-bottom:20px;">OFFICIAL RECEIPT</p>
        </center>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; font-size:12px;">
            <div><label>GUEST</label><br><b id="pName"></b></div>
            <div><label>MOBILE</label><br><b id="pPhone"></b></div>
            <div><label>PAX</label><br><b id="pPax"></b></div>
            <div><label>ROOMS</label><br><b id="pQty"></b></div>
            <div><label>IN</label><br><b id="pIn"></b></div>
            <div><label>OUT</label><br><b id="pOut"></b></div>
        </div>
        <div style="background:#f1f5f9; padding:25px; border-radius:12px; margin-top:25px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>Total</span><b id="pTotal"></b></div>
            <div style="display:flex; justify-content:space-between; color:#ef4444; border-top:1px solid #ddd; padding-top:10px; font-size:1.1rem">
                <span>DUE</span><b id="pBal"></b>
            </div>
        </div>
        <div style="margin-top:30px; text-align:center; font-size:0.7rem; color:#94a3b8; border-top:1px dashed #ddd; padding-top:20px;">
            <p>DESIGN & CREDIT: MATINDRABTRIPURA</p>
            <p>Generated on: <span id="pNow"></span></p>
        </div>
        <div class="no-print" style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="window.print()" class="btn-save" style="margin:0; flex:1">Print Now</button>
            <button onclick="document.getElementById('modal').style.display='none'" class="btn-save" style="margin:0; flex:1; background:#94a3b8">Close</button>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('RoyalInn_V7')) || [];

    // Live Clock
    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);

    function show(v) {
        document.getElementById('tab-new').style.display = v === 'new' ? 'block' : 'none';
        document.getElementById('tab-db').style.display = v === 'db' ? 'block' : 'none';
        document.getElementById('title').innerText = v === 'new' ? 'Reservation Desk' : 'Guest Records';
        document.getElementById('l-new').className = v === 'new' ? 'nav-link active' : 'nav-link';
        document.getElementById('l-db').className = v === 'db' ? 'nav-link active' : 'nav-link';
        if(v === 'db') loadRecords();
    }

    function updateSMS() {
        const name = document.getElementById('gName').value || "Guest";
        const cin = document.getElementById('gIn').value;
        let dateFormatted = "--/--/----";
        if(cin) {
            const [y, m, d] = cin.split('-');
            dateFormatted = `${d}/${m}/${y}`;
        }
        
        const sms = `🏨 Welcome to Hotel Royal Inn!\n\nDear ${name},\nYour booking is confirmed for ${dateFormatted}.\nWe look forward to hosting you. Have a safe journey!\n\nBest regards,\nHotel Management\n(Design: Matindra Tripura)`;
        
        document.getElementById('sms-body').innerText = sms;
    }

    function copySMS() {
        const text = document.getElementById('sms-body').innerText;
        navigator.clipboard.writeText(text).then(() => alert("Welcome SMS Copied!"));
    }

    function save() {
        const entry = {
            id: Date.now(),
            name: document.getElementById('gName').value,
            phone: document.getElementById('gPhone').value,
            ad: document.getElementById('gAdult').value,
            ch: document.getElementById('gChild').value,
            in: document.getElementById('gIn').value,
            out: document.getElementById('gOut').value,
            type: document.getElementById('gType').value,
            tot: document.getElementById('gTotal').value,
            adv: document.getElementById('gAdv').value,
            qty: document.getElementById('gQty').value
        };
        if(!entry.name || !entry.in) return alert("Error: Guest Name and Check-In Date are required!");
        db.push(entry);
        localStorage.setItem('RoyalInn_V7', JSON.stringify(db));
        printSlip(entry.id);
    }

    function loadRecords() {
        const body = document.getElementById('table-body');
        body.innerHTML = db.map(i => {
            const [iy, im, id] = i.in.split('-');
            const [oy, om, od] = i.out.split('-');
            return `<tr class="row-data">
                <td>${i.name}</td>
                <td>${i.ad}A / ${i.ch}C</td>
                <td>${id}/${im} to ${od}/${om}</td>
                <td>${i.type} (${i.qty})</td>
                <td><b style="color:#ef4444">₹${i.tot - i.adv}</b></td>
                <td>
                    <button onclick="printSlip(${i.id})" style="border:none; background:none; cursor:pointer; font-weight:800; color:var(--sidebar)">SLIP</button>
                    <button onclick="del(${i.id})" style="border:none; background:none; cursor:pointer; font-weight:800; color:#ef4444; margin-left:10px">×</button>
                </td>
            </tr>`;
        }).join('');
    }

    function printSlip(id) {
        const i = db.find(x => x.id === id);
        const [iy, im, id_] = i.in.split('-');
        const [oy, om, od] = i.out.split('-');
        document.getElementById('pName').innerText = i.name;
        document.getElementById('pPhone').innerText = i.phone;
        document.getElementById('pPax').innerText = `${i.ad} Adults / ${i.ch} Children`;
        document.getElementById('pQty').innerText = i.qty;
        document.getElementById('pIn').innerText = `${id_}/${im}/${iy}`;
        document.getElementById('pOut').innerText = `${od}/${om}/${oy}`;
        document.getElementById('pTotal').innerText = "₹" + i.tot;
        document.getElementById('pBal').innerText = "₹" + (i.tot - i.adv);
        document.getElementById('pNow').innerText = new Date().toLocaleDateString('en-GB');
        document.getElementById('modal').style.display = 'flex';
    }

    function del(id) {
        if(confirm("Confirm: Delete Guest Record?")) {
            db = db.filter(x => x.id !== id);
            localStorage.setItem('RoyalInn_V7', JSON.stringify(db));
            loadRecords();
        }
    }
</script>

</body>
</html>
