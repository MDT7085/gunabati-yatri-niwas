<!DOCTYPE html>
<html>
<head>
<title>Gunabati Yatri Niwas Hotel System</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.header{
background:#8B0000;
color:white;
padding:15px;
text-align:center;
}

.menu{
background:#333;
padding:10px;
}

.menu button{
padding:10px;
margin:5px;
color:white;
background:#555;
border:none;
cursor:pointer;
}

.container{
padding:20px;
}

input,select{
padding:8px;
margin:5px;
}

table{
border-collapse:collapse;
width:100%;
margin-top:15px;
}

table,th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

</style>

</head>

<body>

<div class="header">
<h2>Gunabati Yatri Niwas Hotel Management</h2>
</div>

<div class="container" id="login">

<h3>Login</h3>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

</div>

<div id="system" style="display:none">

<div class="menu">

<button onclick="show('checkin')">Guest Check-In</button>
<button onclick="show('booking')">Room Booking</button>
<button onclick="show('water')">Water Sale</button>
<button onclick="show('tea')">Tea/Coffee Sale</button>
<button onclick="show('expense')">Expense</button>
<button onclick="show('report')">Monthly Report</button>

</div>

<div class="container">

<div id="checkin">

<h3>Guest Check-In</h3>

<input id="gname" placeholder="Guest Name">
<input id="gmobile" placeholder="Mobile"><br>

<select id="room">

<option>201</option>
<option>202</option>
<option>203</option>
<option>204</option>
<option>205</option>
<option>206</option>
<option>207</option>
<option>208</option>
<option>209</option>
<option>210</option>
<option>211</option>
<option>212</option>

</select>

<input id="cin" type="date">
<input id="cout" type="date">

<button onclick="addGuest()">Save</button>

<table id="guestTable">

<tr>
<th>Name</th>
<th>Room</th>
<th>CheckIn</th>
<th>CheckOut</th>
</tr>

</table>

</div>

<div id="booking" style="display:none">

<h3>Room Booking</h3>

<input id="bname" placeholder="Guest Name">
<select id="broom">

<option>201</option>
<option>202</option>
<option>203</option>
<option>204</option>
<option>205</option>
<option>206</option>
<option>207</option>
<option>208</option>
<option>209</option>
<option>210</option>
<option>211</option>
<option>212</option>

</select>

<input id="bin" type="date">
<input id="bout" type="date">

<button onclick="addBooking()">Book</button>

<table id="bookTable">

<tr>
<th>Name</th>
<th>Room</th>
<th>From</th>
<th>To</th>
</tr>

</table>

</div>

<div id="water" style="display:none">

<h3>Water Sale</h3>

<input id="wqty" placeholder="Quantity">
<input id="wprice" placeholder="Price">

<button onclick="waterSale()">Add</button>

<table id="waterTable">

<tr>
<th>Quantity</th>
<th>Amount</th>
</tr>

</table>

</div>

<div id="tea" style="display:none">

<h3>Tea / Coffee Sale</h3>

<input id="tqty" placeholder="Quantity">
<input id="tprice" placeholder="Amount">

<button onclick="teaSale()">Add</button>

<table id="teaTable">

<tr>
<th>Quantity</th>
<th>Amount</th>
</tr>

</table>

</div>

<div id="expense" style="display:none">

<h3>Expense Entry</h3>

<input id="etype" placeholder="Expense Type">
<input id="eamount" placeholder="Amount">

<button onclick="addExpense()">Add</button>

<table id="expenseTable">

<tr>
<th>Type</th>
<th>Amount</th>
</tr>

</table>

</div>

<div id="report" style="display:none">

<h3>Monthly Report</h3>

<button onclick="calculate()">Show Report</button>

<p id="result"></p>

</div>

</div>

</div>

<script>

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u=="admin" && p=="1234"){
document.getElementById("login").style.display="none"
document.getElementById("system").style.display="block"
}else{
alert("Wrong Login")
}

}

function show(id){

document.querySelectorAll(".container > div").forEach(d=>{
d.style.display="none"
})

document.getElementById(id).style.display="block"

}

let waterTotal=0
let teaTotal=0
let expenseTotal=0

function addGuest(){

let table=document.getElementById("guestTable")
let row=table.insertRow()

row.insertCell(0).innerHTML=document.getElementById("gname").value
row.insertCell(1).innerHTML=document.getElementById("room").value
row.insertCell(2).innerHTML=document.getElementById("cin").value
row.insertCell(3).innerHTML=document.getElementById("cout").value

}

function addBooking(){

let table=document.getElementById("bookTable")
let row=table.insertRow()

row.insertCell(0).innerHTML=document.getElementById("bname").value
row.insertCell(1).innerHTML=document.getElementById("broom").value
row.insertCell(2).innerHTML=document.getElementById("bin").value
row.insertCell(3).innerHTML=document.getElementById("bout").value

}

function waterSale(){

let qty=document.getElementById("wqty").value
let price=document.getElementById("wprice").value

waterTotal+=Number(price)

let table=document.getElementById("waterTable")
let row=table.insertRow()

row.insertCell(0).innerHTML=qty
row.insertCell(1).innerHTML=price

}

function teaSale(){

let qty=document.getElementById("tqty").value
let price=document.getElementById("tprice").value

teaTotal+=Number(price)

let table=document.getElementById("teaTable")
let row=table.insertRow()

row.insertCell(0).innerHTML=qty
row.insertCell(1).innerHTML=price

}

function addExpense(){

let type=document.getElementById("etype").value
let amount=document.getElementById("eamount").value

expenseTotal+=Number(amount)

let table=document.getElementById("expenseTable")
let row=table.insertRow()

row.insertCell(0).innerHTML=type
row.insertCell(1).innerHTML=amount

}

function calculate(){

let totalIncome=waterTotal+teaTotal
let balance=totalIncome-expenseTotal

document.getElementById("result").innerHTML=

"Water Sale: "+waterTotal+
"<br>Tea/Coffee Sale: "+teaTotal+
"<br>Total Expense: "+expenseTotal+
"<br><b>Balance: "+balance+"</b>"

}

</script>

</body>
</html>
