<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Royal Inn - Admin</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #ecf0f1;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        
        /* Room Grid Styles */
        .floor-section { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
        .room { 
            padding: 15px; border-radius: 5px; text-align: center; cursor: pointer; 
            color: white; font-weight: bold; transition: 0.3s;
        }
        .available { background-color: var(--success); }
        .booked { background-color: var(--danger); }

        /* Form Styles */
        .admin-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
        
        .footer-credit { text-align: center; margin-top: 40px; padding: 20px; font-style: italic; color: #777; }
        
        @media print {
            .no-print { display: none; }
            body { background: white; }
        }
    </style>
</head>
<body>

<header>
    <h1>HOTEL ROYAL INN</h1>
    <p>Management Dashboard</p>
</header>

<div class="container">
    
    <section class="floor-section">
        <h2>Room Status (Click to view/book)</h2>
        <div id="floorsContainer"></div>
    </section>

    <div class="admin-panel no-print">
        <div class="card">
            <h3>Add Income</h3>
            <select id="incomeCat">
                <option value="Room Sale">Room Sale</option>
                <option value="Food Sale">Food Sale</option>
                <option value="Event">Event / Program</option>
            </select>
            <input type="number" id="incomeAmt" placeholder="Amount">
            <button onclick="addEntry('income')">Add Income</button>
            <hr>
            <h4>Custom Category</h4>
            <input type="text" id="newInCat" placeholder="New Category Name">
            <button style="background:#34495e" onclick="addNewCategory('incomeCat', 'newInCat')">Add New Category</button>
        </div>

        <div class="card">
            <h3>Add Expense</h3>
            <select id="expenseCat">
                <option value="Staff Salary">Staff Salary</option>
                <option value="Staff Advance">Staff Advance</option>
                <option value="LPG Gas">LPG Gas</option>
                <option value="Marketing">Marketing</option>
                <option value="Electric Bill">Electric Bill</option>
            </select>
            <input type="number" id="expenseAmt" placeholder="Amount">
            <button onclick="addEntry('expense')" style="background:#c0392b">Add Expense</button>
            <hr>
            <h4>Custom Category</h4>
            <input type="text" id="newExCat" placeholder="New Category Name">
            <button style="background:#34495e" onclick="addNewCategory('expenseCat', 'newExCat')">Add New Category</button>
        </div>
    </div>

    <section class="card" style="margin-top:20px;">
        <h3>Monthly Financial Report</h3>
        <table width="100%" border="1" style="border-collapse:collapse; text-align:left;" id="reportTable">
            <thead>
                <tr style="background:#eee;">
                    <th>Type</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th class="no-print">Action</th>
                </tr>
            </thead>
            <tbody id="reportItems"></tbody>
        </table>
        <button onclick="window.print()" style="margin-top:20px; background:#2980b9;">Print Full Monthly Report</button>
    </section>

    <div class="footer-credit">
        Website Designed by: <strong>MATINDRA TRIPURA</strong>
    </div>
</div>

<script>
    // Room Data
    const roomData = {
        "1st Floor": [117, 118],
        "2nd Floor": [101,102,103,104,105,106,107,108],
        "3rd Floor": [109,110,111,112,114,115,116]
    };

    const bookings = {}; // Stores guest names

    // Initialize Rooms
    function initRooms() {
        const container = document.getElementById('floorsContainer');
        for (const [floor, rooms] of Object.entries(roomData)) {
            let html = `<h4>${floor}</h4><div class="room-grid">`;
            rooms.forEach(num => {
                html += `<div id="room-${num}" class="room available" onclick="toggleRoom(${num})">
                            Room ${num}<br><small id="name-${num}"></small>
                         </div>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        }
    }

    function toggleRoom(num) {
        const roomDiv = document.getElementById(`room-${num}`);
        const nameSpan = document.getElementById(`name-${num}`);
        
        if (roomDiv.classList.contains('available')) {
            let guestName = prompt("Enter Guest Name for Room " + num);
            if (guestName) {
                bookings[num] = guestName;
                roomDiv.classList.replace('available', 'booked');
                nameSpan.innerText = guestName;
            }
        } else {
            if(confirm("Checkout Room " + num + "?")) {
                delete bookings[num];
                roomDiv.classList.replace('booked', 'available');
                nameSpan.innerText = "";
            }
        }
    }

    // Category & Finance Logic
    function addNewCategory(selectId, inputId) {
        const val = document.getElementById(inputId).value;
        if (val) {
            const sel = document.getElementById(selectId);
            const opt = document.createElement("option");
            opt.text = val;
            sel.add(opt);
            document.getElementById(inputId).value = "";
            alert("Category Added!");
        }
    }

    function addEntry(type) {
        const cat = document.getElementById(type + 'Cat').value;
        const amt = document.getElementById(type + 'Amt').value;
        if (!amt) return alert("Enter amount");

        const tbody = document.getElementById('reportItems');
        const row = tbody.insertRow();
        row.innerHTML = `
            <td>${type.toUpperCase()}</td>
            <td>${cat}</td>
            <td>$${amt}</td>
            <td class="no-print">
                <button onclick="this.parentElement.parentElement.remove()" style="background:red; padding:2px 5px; margin:0; width:auto;">Delete</button>
            </td>
        `;
    }

    window.onload = initRooms;
</script>

</body>
</html>
